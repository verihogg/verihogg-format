name: Clang Format

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check formatting
        run: nix-shell --run "bash scripts/check-format.sh"
